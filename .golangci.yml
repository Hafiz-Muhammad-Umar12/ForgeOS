# DevOS — golangci-lint configuration for the Go backend.
# Run: golangci-lint run ./...
# See governance/05-coding-standards.md §6.1 and Engineering Standards §6.
run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gofmt
    - goimports
    - unconvert
    - gocritic
    - bodyclose
    - dupword
    - durationcheck
    - errorlint
    - gocyclo
    - nakedret
    - nilerr
    - prealloc
    - sqlclosecheck
    - unparam
    - wastedassign
    - whitespace

linters-settings:
  goimports:
    local-prefixes: github.com/Hafiz-Muhammad-Umar12/ForgeOS
  gofmt:
    simplify: true
  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-declaration
        severity: warning
      - name: indent-error-flow
        severity: warning
      - name: range-val-in-closure
        severity: warning
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocyclo
    - path: testdata/
      linters:
        - all
  max-issues-per-linter: 0
  max-same-issues: 0
